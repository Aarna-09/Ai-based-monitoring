<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detection System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        function showLoading(action) {
            const loader = document.getElementById("loader");
            const message = document.getElementById("action-message");
            message.textContent = action + " is starting...";
            loader.style.display = "flex";
        }
    </script>
</head>
<body>

    <!-- Animated grid background -->
    <div class="grid-bg"></div>

    <!-- Scanline overlay -->
    <div class="scanlines"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <header>
        <div class="header-glow"></div>
        <div class="header-content">
            <div class="logo-mark">
                <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" stroke="#00f5ff" stroke-width="1.5" stroke-dasharray="4 2"/>
                    <circle cx="30" cy="30" r="18" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
                    <path d="M30 10 L30 50 M10 30 L50 30" stroke="#00f5ff" stroke-width="0.8" opacity="0.4"/>
                    <circle cx="30" cy="30" r="5" fill="#00f5ff"/>
                    <circle cx="30" cy="10" r="2.5" fill="#00f5ff"/>
                    <circle cx="30" cy="50" r="2.5" fill="#00f5ff"/>
                    <circle cx="10" cy="30" r="2.5" fill="#00f5ff"/>
                    <circle cx="50" cy="30" r="2.5" fill="#00f5ff"/>
                </svg>
            </div>
            <div class="title-block">
                <div class="sys-label">SYSTEM ONLINE &nbsp;|&nbsp; v2.4.1</div>
                <h1>AI Detection System</h1>
                <div class="subtitle">Neural Pattern Recognition &bull; Real-time Analysis</div>
            </div>
            <div class="status-block">
                <div class="status-dot"></div>
                <span>LIVE</span>
            </div>
        </div>
    </header>

    <main>
        <div class="description">
            <p>Welcome to the AI Detection System! Choose an action below:</p>
        </div>

        <div class="button-container">
            <form method="POST" action="/start_emotion_detection">
                <button type="submit" class="btn-emotion" onclick="showLoading('Emotion Detection')">
                    <span class="btn-icon">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="14" cy="17" r="2" fill="currentColor"/>
                            <circle cx="26" cy="17" r="2" fill="currentColor"/>
                            <path d="M13 26 Q20 32 27 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                            <path d="M6 20 Q4 20 4 20" stroke="currentColor" stroke-width="1" opacity="0.5"/>
                            <path d="M34 20 Q36 20 36 20" stroke="currentColor" stroke-width="1" opacity="0.5"/>
                        </svg>
                    </span>
                    <span class="btn-text">
                        <span class="btn-title">Detect Emotion</span>
                        <span class="btn-desc">Facial Expression Analysis</span>
                    </span>
                    <span class="btn-arrow">&#8594;</span>
                    <span class="btn-glow-emotion"></span>
                </button>
            </form>

            <form method="POST" action="/start_motion_detection">
                <button type="submit" class="btn-motion" onclick="showLoading('Motion & Behavior Detection')">
                    <span class="btn-icon">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M20 14 L20 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M20 20 L14 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M20 20 L26 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M20 24 L17 34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M20 24 L23 34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="8" cy="20" r="2" stroke="currentColor" stroke-width="1" opacity="0.4"/>
                            <circle cx="32" cy="20" r="2" stroke="currentColor" stroke-width="1" opacity="0.4"/>
                        </svg>
                    </span>
                    <span class="btn-text">
                        <span class="btn-title">Detect Motion &amp; Behavior</span>
                        <span class="btn-desc">Kinematic Pattern Recognition</span>
                    </span>
                    <span class="btn-arrow">&#8594;</span>
                    <span class="btn-glow-motion"></span>
                </button>
            </form>
        </div>

        <div id="loader" style="display: none;">
            <div class="loader-inner">
                <div class="spinner">
                    <div class="spinner-ring ring1"></div>
                    <div class="spinner-ring ring2"></div>
                    <div class="spinner-ring ring3"></div>
                    <div class="spinner-core"></div>
                </div>
                <p id="action-message"></p>
                <div class="loader-bar"><div class="loader-fill"></div></div>
            </div>
        </div>
    </main>

    <footer>
        <span>&copy; 2025 AI Detection System &nbsp;&bull;&nbsp; Neural Intelligence Core</span>
    </footer>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${Math.random() * 3 + 1}px;
                height: ${Math.random() * 3 + 1}px;
                animation-delay: ${Math.random() * 8}s;
                animation-duration: ${Math.random() * 10 + 8}s;
                opacity: ${Math.random() * 0.5 + 0.1};
            `;
            container.appendChild(p);
        }
    </script>
</body>
</html>
